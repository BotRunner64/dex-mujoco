# Retargeting config: MediaPipe -> Wuji Hand
# Finger numbering:
#   1=thumb, 2=index, 3=middle, 4=ring, 5=pinky

hand:
  name: "wujihand_right"
  side: "right"
  mjcf_path: "../../../assets/mjcf/wujihand_right/model.xml"

retargeting:
  type: "vector"

  human_vector_pairs:
    # Thumb
    - [0, 4]
    - [1, 4]
    - [1, 2]
    - [1, 3]
    - [2, 3]
    - [2, 4]
    - [3, 4]
    # Index
    - [5, 6]
    - [6, 8]
    - [7, 8]
    # Middle
    - [9, 10]
    - [10, 12]
    - [11, 12]
    # Ring
    - [13, 14]
    - [14, 16]
    - [15, 16]
    # Little
    - [17, 18]
    - [18, 20]
    - [19, 20]

