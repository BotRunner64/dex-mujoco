    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"

  task_link_types:
    - "body"
    - "body"
    - "body"
    - "body"
    - "site"
    - "site"
    - "body"
    - "body"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"

  vector_weights:
    - 1.0
    - 1.0
    - 1.0
    - 1.0
    - 2.5    # opposition [0,4] (most important)
    - 2.0    # long-range [1,4] (redundant, stabilizes thumb)
    - 1.5
    - 1.5
    - 1.5
    - 1.5
    - 1.5
    - 1.0
    - 1.0
    - 0.8     # fingertip direction
    - 1.0
    - 1.0
    - 0.8     # fingertip direction
    - 1.0
    - 1.0
    - 0.8     # fingertip direction
    - 1.0
    - 1.0
    - 0.8     # fingertip direction

  angle_constraints:
    # Direct joint angle matching (breaks axis degeneracy for same-axis joints)
    # landmarks: [a, b, c] = flexion angle at b between (a→b) and (b→c)
    # Thumb
    - landmarks: [1, 2, 3]    # thumb cmc→mcp→ip
      joint: "thumb_mcp"
      weight: 3.0
    - landmarks: [2, 3, 4]    # thumb mcp→ip→tip
      joint: "thumb_dip"
      weight: 3.0
    # Index
    - landmarks: [5, 6, 7]    # mcp→pip→dip
      joint: "index_pip"
      weight: 2.0
    - landmarks: [6, 7, 8]    # pip→dip→tip
      joint: "index_dip"
      weight: 2.0
    # Middle
    - landmarks: [9, 10, 11]
      joint: "middle_pip"
      weight: 2.0
    - landmarks: [10, 11, 12]
      joint: "middle_dip"
      weight: 2.0
    # Ring
    - landmarks: [13, 14, 15]
      joint: "ring_pip"
      weight: 2.0
    - landmarks: [14, 15, 16]
      joint: "ring_dip"
      weight: 2.0
    # Pinky
    - landmarks: [17, 18, 19]
      joint: "pinky_pip"
      weight: 2.0
    - landmarks: [18, 19, 20]
      joint: "pinky_dip"
      weight: 2.0

  position_constraints:
    enabled: true
    weight: 8.0
    scale_landmarks: [0, 9]         # wrist, middle_mcp
    scale_bodies: ["world", "middle_proximal"]
    scale_body_types: ["body", "body"]
    constraints:
      - landmark: 2                  # thumb MCP
        body: "thumb_metacarpals"
        body_type: "body"
        weight: 1.0
      - landmark: 3                  # thumb IP
        body: "thumb_proximal"
        body_type: "body"
        weight: 1.0
      - landmark: 4                  # thumb TIP
        body: "thumb_distal_tip"
        body_type: "site"
        weight: 1.5

  pinch:
    enabled: true
    d1: 0.03          # full pinch threshold (meters)
    d2: 0.06          # no pinch threshold (meters)
    weight: 5.0       # fingertip attraction loss weight
    thumb_weight_boost: 1.5  # thumb vector weight multiplier during pinch
    fingertip_sites:
      - "thumb_distal_tip"
      - "index_distal_tip"
      - "middle_distal_tip"
      - "ring_distal_tip"
      - "pinky_distal_tip"

  preprocess:
    frame: "wrist_local"
    temporal_filter_alpha: 0.65

  solver:
    max_iterations: 60
    norm_delta: 0.001
    output_alpha: 0.92
